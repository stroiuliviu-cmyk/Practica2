# Configurare Nginx pentru Infinity SRL în producție
# Plasează în /etc/nginx/sites-available/infinity
# Activează cu: sudo ln -s /etc/nginx/sites-available/infinity /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name infinity.md www.infinity.md;
    return 301 https://infinity.md$request_uri;
}

server {
    listen 443 ssl http2;
    server_name infinity.md www.infinity.md;
    root /var/www/infinity/public;
    index index.php;

    # SSL — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/infinity.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infinity.md/privkey.pem;

    # Headers securitate
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Laravel — pretty URLs
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    # Blocare acces fișiere sensibile
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /(\.env|composer\.(json|lock)|package\.json) {
        deny all;
    }

    access_log /var/log/nginx/infinity-access.log;
    error_log /var/log/nginx/infinity-error.log;
}
