# Configurare Apache VirtualHost pentru Infinity SRL în producție
# Plasează în /etc/apache2/sites-available/infinity.conf
# Activează cu: sudo a2ensite infinity && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName infinity.md
    ServerAlias www.infinity.md
    DocumentRoot /var/www/infinity/public

    # Redirect HTTP → HTTPS (după ce SSL este configurat)
    Redirect permanent / https://infinity.md/

    ErrorLog ${APACHE_LOG_DIR}/infinity-error.log
    CustomLog ${APACHE_LOG_DIR}/infinity-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName infinity.md
    ServerAlias www.infinity.md
    DocumentRoot /var/www/infinity/public

    # SSL (Let's Encrypt sau certificat comercial)
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/infinity.md/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/infinity.md/privkey.pem

    <Directory /var/www/infinity/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Cache static assets 30 zile
    <FilesMatch "\.(css|js|jpg|jpeg|png|svg|webp|woff2?)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>

    # Securitate — headers HTTP recomandate
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog ${APACHE_LOG_DIR}/infinity-error.log
    CustomLog ${APACHE_LOG_DIR}/infinity-access.log combined
</VirtualHost>
